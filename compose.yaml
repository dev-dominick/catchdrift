services:
  postgres:
    image: postgres:16-alpine
    container_name: catchdrift-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: catchdrift
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - catchdrift_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catchdrift"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  catchdrift_pgdata:
